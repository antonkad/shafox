<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shafox — every commit wears a different fox</title>
    <meta
      name="description"
      content="A living demo of kad.dev's per-commit deploy timeline. Every commit derives a unique fox from its SHA — deploy two, tell them apart at a glance, roll back and watch the face return."
    />
    <link rel="icon" href="/favicon.svg?v=6" type="image/svg+xml" />
    <meta name="color-scheme" content="light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Fraunces:opsz,wght@9..144,600;9..144,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" aria-busy="true"></div>
    <!-- Filled in by server/index.js at request time from BUILD_COMMIT_SHA etc.
         Left as %%…%% placeholders during `vite dev`, where main.ts falls back
         to the build-time constants. -->
    <script>
      window.__SHAFOX__ = { commit: "%%COMMIT%%", ref: "%%REF%%", buildTime: "%%BUILDTIME%%" };
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
